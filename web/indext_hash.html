<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash / Dehash Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md flex flex-col gap-6 border border-gray-200">
        <div class="flex flex-col items-center gap-2">
            <span class="font-bold text-gray-700">Mode</span>
            <button id="modeToggle" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-semibold hover:bg-indigo-700 active:scale-95 transition-all w-full shadow-md">
                Switch to Dehash
            </button>
            <p id="currentModeLabel" class="text-xs text-indigo-600 font-black uppercase tracking-widest">Current: Hash</p>
        </div>

        <hr class="border-gray-100">

        <div class="flex flex-col gap-2">
            <label id="inputLabel" class="font-semibold text-gray-600 text-sm">Plaintext Input</label>
            <textarea id="mainInput" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none h-28 transition-all" placeholder="Enter text here..."></textarea>
            
            <div id="fileUploadSection" class="mt-1">
                <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Or upload file/image</label>
                <input type="file" id="fileInput" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
            </div>
        </div>

        <div class="flex flex-col gap-2">
            <label class="font-semibold text-gray-600 text-sm">Algorithm</label>
            <select id="algoSelect" class="w-full p-2 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer">
                <option value="SHA256">SHA-256</option>
                <option value="SHA512">SHA-512</option>
                <option value="MD5">MD5</option>
                <option value="SHA1">SHA-1</option>
            </select>
        </div>

        <div class="flex flex-col gap-2">
            <div class="flex justify-between items-end">
                <label id="outputLabel" class="font-semibold text-gray-600 text-sm">Hash Output</label>
                <button id="copyBtn" class="text-[10px] font-bold text-indigo-600 hover:text-indigo-800 uppercase tracking-tighter border border-indigo-200 px-2 py-1 rounded bg-indigo-50 hover:bg-indigo-100 transition-colors">
                    Copy Result
                </button>
            </div>
            <div id="outputBox" class="w-full p-4 bg-gray-50 border border-dashed border-gray-300 rounded-lg break-all text-sm font-mono min-h-[80px] flex items-center justify-center text-gray-400 text-center">
                Waiting for input...
            </div>
        </div>
    </div>

    <script>
        const modeToggle = document.getElementById('modeToggle');
        const currentModeLabel = document.getElementById('currentModeLabel');
        const mainInput = document.getElementById('mainInput');
        const fileInput = document.getElementById('fileInput');
        const algoSelect = document.getElementById('algoSelect');
        const outputBox = document.getElementById('outputBox');
        const inputLabel = document.getElementById('inputLabel');
        const outputLabel = document.getElementById('outputLabel');
        const fileUploadSection = document.getElementById('fileUploadSection');
        const copyBtn = document.getElementById('copyBtn');

        let isHashMode = true;

        // Toggle Logic
        modeToggle.addEventListener('click', () => {
            isHashMode = !isHashMode;
            updateUI();
            process();
        });

        function updateUI() {
            if (isHashMode) {
                modeToggle.innerText = "Switch to Dehash";
                currentModeLabel.innerText = "Current: Hash";
                inputLabel.innerText = "Plaintext Input";
                outputLabel.innerText = "Hash Output";
                fileUploadSection.style.display = 'block';
                mainInput.placeholder = "Enter text to hash...";
            } else {
                modeToggle.innerText = "Switch to Hash";
                currentModeLabel.innerText = "Current: Dehash";
                inputLabel.innerText = "Hash Input";
                outputLabel.innerText = "Plaintext Result";
                fileUploadSection.style.display = 'none';
                mainInput.placeholder = "Enter hash to reverse...";
            }
        }

        // Processing Logic (Now Asynchronous)
        async function process() {
            const val = mainInput.value.trim();
            const algo = algoSelect.value.toLowerCase();

            if (!val && !fileInput.files[0]) {
                outputBox.innerText = "Waiting for input...";
                outputBox.classList.add('text-gray-400');
                return;
            }

            outputBox.classList.remove('text-gray-400');
            outputBox.classList.add('text-gray-800');

            if (isHashMode) {
                if (val) {
                    const hashAlgo = algo === 'sha256' ? CryptoJS.SHA256 : 
                                   algo === 'sha512' ? CryptoJS.SHA512 : 
                                   algo === 'md5' ? CryptoJS.MD5 : CryptoJS.SHA1;
                    outputBox.innerText = hashAlgo(val).toString();
                }
            } else {
                // --- DEHASH LOGIC ---
                outputBox.innerText = "Searching rainbow tables...";
                
                // Replace 'YOUR_EMAIL' and 'YOUR_API_KEY' with credentials from md5decrypt.net
                // Note: Dehashing requires external lookups because hashes are one-way functions.
                const apiKey = "USER_KEY_HERE"; 
                const email = "USER_EMAIL_HERE";
                
                try {
                    // Using md5decrypt.net free API structure
                    const response = await fetch(`https://md5decrypt.net/Api/api.php?hash=${val}&hash_type=${algo}&email=${email}&code=${apiKey}`);
                    const result = await response.text();

                    if (result && !result.includes("ERROR")) {
                        outputBox.innerText = result;
                    } else {
                        outputBox.innerText = "No match found in database.";
                    }
                } catch (error) {
                    outputBox.innerText = "API Error: Could not connect to dehash service.";
                    console.error(error);
                }
            }
        }

        // File Handling
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = CryptoJS.lib.WordArray.create(e.target.result);
                const algo = algoSelect.value;
                const hashAlgo = algo === 'SHA256' ? CryptoJS.SHA256 : 
                               algo === 'SHA512' ? CryptoJS.SHA512 : 
                               algo === 'MD5' ? CryptoJS.MD5 : CryptoJS.SHA1;
                outputBox.innerText = hashAlgo(data).toString();
                outputBox.classList.remove('text-gray-400');
            };
            reader.readAsArrayBuffer(file);
        });

        // Copy to Clipboard
        copyBtn.addEventListener('click', () => {
            const textToCopy = outputBox.innerText;
            if (textToCopy && !textToCopy.includes("Waiting") && !textToCopy.includes("Searching")) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    const originalText = copyBtn.innerText;
                    copyBtn.innerText = "Copied!";
                    copyBtn.classList.replace('bg-indigo-50', 'bg-green-100');
                    setTimeout(() => {
                        copyBtn.innerText = originalText;
                        copyBtn.classList.replace('bg-green-100', 'bg-indigo-50');
                    }, 1500);
                });
            }
        });

        // Listeners for Auto-Response
        mainInput.addEventListener('input', process);
        algoSelect.addEventListener('change', process);

    </script>
</body>
</html>
